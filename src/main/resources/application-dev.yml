spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tsundoku_db}
    username: ${SPRING_DATASOURCE_USERNAME:tsundoku_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tsundoku_password}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.tsundoku.backend: DEBUG
    org.springframework.security: DEBUG
