spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

tsundoku:
  jwt:
    secret: test_super_secret_jwt_key_that_is_at_least_256_bits_long_tsundoku_test_environment_2026
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000

logging:
  level:
    root: INFO
    com.tsundoku.backend: DEBUG
