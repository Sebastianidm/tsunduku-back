spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tsundoku_db}
    username: ${SPRING_DATASOURCE_USERNAME:tsundoku_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tsundoku_password}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false

tsundoku:
  jwt:
    secret: test_super_secret_jwt_key_that_is_at_least_256_bits_long_tsundoku_test_environment_2026
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000

logging:
  level:
    root: INFO
    com.tsundoku.backend: DEBUG
